<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact | Data Pulses</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f14;
  color:#e5e7eb;
}

/* LAYOUT */
.container{
  max-width:760px;
  margin:auto;
  padding:110px 24px;
}

/* TYPO */
h1{
  font-size:34px;
  margin:0 0 8px;
  letter-spacing:-0.3px;
}

p{
  color:#9ca3af;
  line-height:1.6;
  margin:0;
}

/* CARD */
.box{
  margin-top:28px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:18px;
}

/* FORM */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#0b0f14;
  border:1px solid #1f2937;
  color:white;
  border-radius:10px;
  font-size:13px;
  outline:none;
}

input:focus, textarea:focus{
  border-color:#3b82f6;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  background:#3b82f6;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:500;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

/* SOCIAL ICON BAR (UPGRADED) */
.socials{
  display:flex;
  gap:12px;
  margin-top:6px;
  align-items:center;
}

/* icon container */
.socials a{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:12px;
  border:1px solid #1f2937;
  background:#0b0f14;

  color:#cbd5e1;
  text-decoration:none;

  transition: all 0.2s ease;
}

/* svg sizing */
.socials a svg{
  width:20px;
  height:20px;
}

/* hover base */
.socials a:hover{
  transform: translateY(-3px) scale(1.05);
  border-color:#3b82f6;
  color:#3b82f6;
  background:#0f172a;
}

/* WhatsApp */
.socials a[aria-label="WhatsApp"]:hover{
  border-color:#22c55e;
  color:#22c55e;
}

/* LinkedIn */
.socials a[aria-label="LinkedIn"]:hover{
  border-color:#60a5fa;
  color:#60a5fa;
}

/* Instagram */
.socials a[aria-label="Instagram"]:hover{
  border-color:#f472b6;
  color:#f472b6;
}

/* Email */
.socials a[aria-label="Email"]:hover{
  border-color:#9ca3af;
  color:#e5e7eb;
}

/* LABEL */
.label{
  font-size:12px;
  color:#6b7280;
  margin-top:18px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Contact</h1>
  <p>Direct access for audit requests and business enquiries.</p>

  <!-- FORM -->
  <div class="box">

    <form action="https://formspree.io/f/maqgovay" method="POST">

      <input type="hidden" name="_subject" value="New Audit Request - Data Pulses">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="message" rows="4" placeholder="Describe your situation"></textarea>

      <button type="submit">Request Audit</button>

    </form>

  </div>

  <!-- SOCIALS -->
  <div class="box">

    <div class="label">Connect directly</div>

    <div class="socials">

      <!-- WhatsApp -->
      <a href="https://wa.me/61413303718?text=Hi%20Data%20Pulses%2C%20I%20want%20an%20audit" target="_blank" aria-label="WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.5 3.5A11.8 11.8 0 0 0 12 0C5.4 0 0 5.4 0 12c0 2.1.6 4.1 1.6 5.8L0 24l6.3-1.6A11.9 11.9 0 0 0 12 24c6.6 0 12-5.4 12-12 0-3.2-1.3-6.2-3.5-8.5z"/>
        </svg>
      </a>

      <!-- LinkedIn -->
      <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 3.5C4 4.9 2.9 6 1.5 6S-1 4.9-1 3.5 0.1 1 1.5 1 4 2.1 4 3.5zM0 24h5V7H0v17zm8-17h5v2.3h.1C14 8.2 15.6 7 17.8 7 22 7 24 9.5 24 14v10h-5v-9.3c0-2.2-.4-4.7-3.1-4.7-3.1 0-3.6 2.4-3.6 4.6V24H8V7z"/>
        </svg>
      </a>

      <!-- Instagram -->
      <a href="https://instagram.com" target="_blank" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 6.5A4.5 4.5 0 1 0 16.5 13 4.5 4.5 0 0 0 12 8.5z"/>
        </svg>
      </a>

      <!-- Email -->
      <a href="mailto:consulting@datapulses.com.au" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
      </a>

    </div>
  </div>

</div>

</body>
</html>
