<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact | Data Pulses</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f14;
  color:#e5e7eb;
}

/* LAYOUT */
.container{
  max-width:760px;
  margin:auto;
  padding:110px 24px;
}

/* TYPO */
h1{
  font-size:34px;
  margin:0 0 8px;
  letter-spacing:-0.3px;
}

p{
  color:#9ca3af;
  line-height:1.6;
  margin:0;
}

/* CARD */
.box{
  margin-top:28px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:18px;
}

/* FORM */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#0b0f14;
  border:1px solid #1f2937;
  color:white;
  border-radius:10px;
  font-size:13px;
  outline:none;
}

input:focus, textarea:focus{
  border-color:#3b82f6;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  background:#3b82f6;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:500;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

/* SOCIAL ICON BAR */
.socials{
  display:flex;
  gap:12px;
  margin-top:6px;
}

.socials a{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  border:1px solid #1f2937;
  color:#cbd5e1;
  text-decoration:none;
  font-size:12px;
  transition:0.2s;
}

.socials a:hover{
  border-color:#3b82f6;
  color:#3b82f6;
  transform:translateY(-2px);
}

/* LABEL */
.label{
  font-size:12px;
  color:#6b7280;
  margin-top:18px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Contact</h1>
  <p>Direct access for audit requests and business enquiries.</p>

  <!-- FORM -->
  <div class="box">

    <form action="https://formspree.io/f/maqgovay" method="POST">

      <input type="hidden" name="_subject" value="New Audit Request - Data Pulses">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="message" rows="4" placeholder="Describe your situation"></textarea>

      <button type="submit">Request Audit</button>

    </form>

  </div>

  <!-- SOCIALS -->
  <div class="box">

    <div class="label">Connect directly</div>

    <div class="socials">

      <a href="https://wa.me/61413303718?text=Hi%20Data%20Pulses%2C%20I%20want%20an%20audit" target="_blank">
        WA
      </a>

      <a href="https://linkedin.com" target="_blank">
        IN
      </a>

      <a href="https://instagram.com" target="_blank">
        IG
      </a>

      <a href="mailto:consulting@datapulses.com.au">
        @
      </a>

    </div>

  </div>

</div>

</body>
</html>
